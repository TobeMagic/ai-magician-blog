title: AI Magician
subtitle: OpenClaw-driven canonical technical writing lab
description: Canonical site for AI engineering, automation systems, and self-media publishing experiments.
keywords:
  - OpenClaw
  - AI Engineering
  - Hexo
  - Automation
author: aimagician
language: zh-CN
timezone: Asia/Shanghai

url: https://tobemagic.github.io/ai-magician-blog
root: /
permalink: posts/:year/:month/:day/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

theme: bamboo

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: []

per_page: 10
pagination_dir: page
default_layout: post
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

external_link:
  enable: true
  field: site
  exclude: ""

syntax_highlighter: ""
prismjs:
  enable: true
  preprocess: true
  line_number: false
  tab_replace: "  "

deploy:
  type: git
  repository: ""
  branch: gh-pages
  message: "chore(hexo): deploy"

sitemap:
  path:
    - sitemap.xml
    - sitemap.txt
  tags: true
  categories: true

feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 200
  content_limit_delim: " "
  order_by: -date

search:
  path: search.xml
  field: post
  content: true
  format: html

algolia:
  appId: ""
  apiKey: ""
  adminApiKey: ""
  indexName: aimagician_posts
  chunkSize: 5000
  fields:
    - title
    - slug
    - path
    - excerpt:strip
    - content:strip:truncate,0,300
    - categories
    - tags
