menu:
  Home:
    url: /
    icon: fas fa-house
  Archives:
    url: /archives
    icon: fas fa-box-archive
  Tags:
    url: /tags
    icon: fas fa-tags
  Categories:
    url: /categories
    icon: fas fa-folder-tree
  Friends:
    url: /friends
    icon: fas fa-link
  About:
    url: /about
    icon: fas fa-user-astronaut

Github:
  on: true
  url: https://github.com/TobeMagic/openclaw-tech-selfmedia-workspace

logo: /medias/logo.png
favicon: /favicon.ico

sidebar:
  position: left
  widget_library:
    side_blogger:
      on: true
      avatar: /medias/logo.png
      shape: rectangle
      url: /about/
      title: AI Magician
      subtitle: OpenClaw 驱动的技术自媒体实验室
      jinrishici: "让自动化替你搬砖，让内容真正留下来。"
      background: "#ffffff"
      social:
        - icon: fas fa-rss
          url: /atom.xml
        - icon: fas fa-globe
          url: https://tobemagic.github.io/openclaw-tech-selfmedia-workspace/
        - icon: fab fa-github
          url: https://github.com/TobeMagic/openclaw-tech-selfmedia-workspace
        - icon: fas fa-pen-nib
          url: https://tobemagic.github.io/openclaw-tech-selfmedia-workspace/archives
    side_toc:
      on: true
      background: "#ffffff"
      order: -1
      header:
        icon: fas fa-list
        title: 本文目录
      before: number
      heading: h2, h3, h4
      collapseDepth: 20
    side_category:
      on: true
      background: "#ffffff"
      header:
        icon: fas fa-folder-open
        title: 文章分类
        url: /categories/
    side_tagcloud:
      on: true
      background: "#ffffff"
      header:
        icon: fas fa-tags
        title: 热门标签
        url: /tags/
      min_font: 14
      max_font: 24
      color: true
      start_color: "#ff784f"
      end_color: "#0f172a"
    side_recent_post:
      on: true
      background: "#ffffff"
      limit: 6
      sort: update
      header:
        icon: fas fa-book
        title: 最新文章
        url: /archives/
    side_archives:
      on: true
      type: monthly
      format: YYYY-MM
      timeOrder: -1
      limit: 12
      background: "#ffffff"
      header:
        icon: fas fa-archive
        title: 归档
    side_webinfo:
      background: "#ffffff"
      header:
        icon: fas fa-chart-line
        title: 站点信息
      type:
        article:
          on: true
          text: "文章数目："
          unit: "篇"
        runtime:
          on: true
          data: "2026/03/26"
          text: "已运行时间："
          unit: "天"
        wordcount:
          on: true
          text: "本站总字数："
          unit: "字"
        visitcounter:
          service: busuanzi
          siteuv:
            on: true
            text: "本站访客数："
            unit: "人"
          sitepv:
            on: true
            text: "本站总访问量："
            unit: "次"
        lastupd:
          on: true
          friendlyShow: true
          text: "最后活动时间："
          unit: "日"

preloader:
  on: true
  type: 6

swiper:
  on: true
  showPrevNext: true
  showIndicators: true
  autoplay: true
  loop: true
  delay: 4500
  effect: slide
  textAnimated: fadeInDown
  textDuration: 0.3s
  textDelay: 0.1s
  readMoreBtn: true
  bubble: true
  wave: true
  defaultImg: https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80
  defaultTile: AI Magician
  defaultDesc:
    - 用 OpenClaw 打通技术自媒体自动化链路
    - 用 Hexo 作为 canonical 主站，公众号和社区作为分发末端
  defaultLeftBtnText: 阅读归档
  defaultLeftBtnLink: /archives/
  defaultRightBtnText: 浏览源码
  defaultRightBtnLink: https://github.com/TobeMagic/openclaw-tech-selfmedia-workspace
  defaultDescTyped: true
  defaultDescTypedSpeed: 80
  defaultDescTypedBackSpeed: 30
  defaultDescTypedLoop: true
  defaultAddToSwiper: true
  full: true

goTop:
  on: true

fancybox:
  on: true
  css: https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.css
  js: https://unpkg.com/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js

busuanzi:
  on: true

show_count: true

donate:
