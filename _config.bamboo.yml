menu:
  Home:
    url: /
    icon: fas fa-house
  Archives:
    url: /archives
    icon: fas fa-box-archive
  Love:
    url: /love/
    icon: fas fa-heart
  About:
    url: /about/
    icon: fas fa-user

Github:
  on: false
  url: https://github.com/TobeMagic/ai-magician-blog

logo: medias/portrait.png
favicon: /medias/portrait.png

sidebar:
  position: left
  widget_library:
    side_blogger:
      on: true
      avatar: medias/portrait.png
      shape: circle
      url: /about/
      title: AI Magician
      subtitle: 欢迎你到来。
      jinrishici: "谢谢你关注。我写代码，也写字。有缘常来。"
      background: "rgba(255,252,250,0.98)"
      social:
        - icon: fab fa-github
          url: https://github.com/TobeMagic
        - icon: fas fa-envelope
          url: mailto:daizhaoji12345@gmail.com
        - icon: fab fa-weixin
          qrcode: medias/wechat-qrcode-white.png
          label: 微信公众号
    side_toc:
      on: true
      background: "rgba(255,252,250,0.98)"
      order: -1
      header:
        icon: fas fa-list
        title: 本文目录
      before: number
      heading: h2, h3, h4
      collapseDepth: 20
    side_category:
      on: true
      background: "rgba(255,252,250,0.98)"
      header:
        icon: fas fa-folder-open
        title: 文章分类
        url: /categories/
    side_tagcloud:
      on: true
      background: "rgba(255,252,250,0.98)"
      header:
        icon: fas fa-tags
        title: 热门标签
        url: /tags/
      min_font: 14
      max_font: 24
      color: true
      start_color: "#e6849d"
      end_color: "#7b4158"
    side_recent_post:
      on: true
      background: "rgba(255,252,250,0.98)"
      limit: 6
      sort: update
      header:
        icon: fas fa-book
        title: 最新文章
        url: /archives/
    side_archives:
      on: true
      type: monthly
      format: YYYY-MM
      timeOrder: -1
      limit: 12
      background: "rgba(255,252,250,0.98)"
      header:
        icon: fas fa-archive
        title: 归档
    side_webinfo:
      on: true
      background: "rgba(255,252,250,0.98)"
      header:
        icon: fas fa-chart-line
        title: 站点信息
      type:
        article:
          on: true
          text: 文章数目
          unit: 篇
        runtime:
          on: false
          text: 已运行时间
          data: auto
          unit: 天
        wordcount:
          on: true
          text: 本站总字数
          unit: 字
        visitcounter:
          service: "busuanzi"
          siteuv:
            on: true
            text: 本站访客数
            unit: 人
          sitepv:
            on: true
            text: 本站总访问量
            unit: 次
        lastupd:
          on: true
          friendlyShow: false
          text: 最后活动时间
          unit: ""
      counters:
        siteuv_offset: 521314
        sitepv_offset: 521314

preloader:
  on: false
  type: 3

swiper:
  on: true
  showPrevNext: true
  showIndicators: false
  autoplay: true
  loop: true
  delay: 5200
  effect: fade
  textAnimated: fadeInDown
  textDuration: 0.45s
  textDelay: 0.15s
  readMoreBtn: true
  bubble: false
  wave: true
  defaultImg: /medias/hero-home.webp
  defaultTile: AI Magician
  defaultDesc:
    - 想在这个信息过剩的时代，只写真正值得写的东西。
    - 技术、财富、认知，以及那些在教科书和成功学之间的空白地带。
    - 那里住着大多数真实的问题，也住着少数真正有用的答案。慢慢找，慢慢写。
  defaultLeftBtnText: 开始阅读
  defaultLeftBtnLink: /ai-magician-blog/archives/
  defaultRightBtnText: 认识我
  defaultRightBtnLink: /ai-magician-blog/about/
  defaultDescTyped: true
  defaultDescTypedSpeed: 52
  defaultDescTypedBackSpeed: 24
  defaultDescTypedLoop: false
  defaultAddToSwiper: true
  full: true

